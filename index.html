<!DOCTYPE html>
          <div id="api-status" style="font-size:12px;margin-top:.5rem;color:var(--ink3)"></div>
        </div>
        <div class="card">
          <div class="chead"><span class="ctitle">Data</span></div>
          <div class="settings-item"><div><div class="settings-label">Export my data</div><div class="settings-sub">Download all your check-ins as JSON</div></div><button onclick="exportData()" style="background:var(--paper);border:1.5px solid var(--paper2);border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;color:var(--ink2)">Export</button></div>
          <div class="settings-item"><div><div class="settings-label" style="color:var(--red)">Reset all data</div><div class="settings-sub">Delete all check-ins and start fresh</div></div><button onclick="resetData()" style="background:var(--rl);border:none;border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;color:var(--red)">Reset</button></div>
        </div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- Invite modal -->
<div id="invmodal" style="display:none;position:fixed;inset:0;background:rgba(14,14,20,.55);z-index:100;align-items:center;justify-content:center;padding:1rem">
  <div style="background:var(--white);border-radius:var(--r2);padding:2rem;width:100%;max-width:440px;animation:riseUp .25s ease both">
    <h3 style="font-family:'Syne',sans-serif;font-size:1.25rem;margin-bottom:.35rem">Invite an employee</h3>
    <p style="font-size:13px;color:var(--ink3);margin-bottom:1.25rem">They'll receive an onboarding link and set up their own personalised track — no admin work needed from you.</p>
    <div class="fld"><label>Employee email</label><input type="email" id="inv-email" placeholder="e.g. amara@company.com"></div>
    <div class="fld"><label>Role / department (optional)</label><input type="text" id="inv-role" placeholder="e.g. Field Coordinator, Operations"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem">
      <button onclick="closeInvite()" style="background:var(--paper);border:1.5px solid var(--paper2);border-radius:var(--r);padding:10px 18px;font-size:13px;font-weight:600;color:var(--ink2)">Cancel</button>
      <button onclick="sendInvite()" style="background:var(--purple);color:#fff;border:none;border-radius:var(--r);padding:10px 20px;font-size:13px;font-weight:600">Send invite ✉️</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span class="toast-ic" id="toast-ic">🔥</span><span id="toast-msg">Toast message</span></div>

<script>
const PROXY_URL = null; // Set to your Cloudflare Worker URL

// ── SUPABASE CONFIG ─────────────────────────────────────────────────────────
// Replace with your values from supabase.com → Settings → API
const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY';

let db = null;
let currentUser = null;

function initSupabase(){
  if(typeof supabase === 'undefined') return; // CDN not loaded
  db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
}

// ── STATE ───────────────────────────────────────────────────────────────────
const DEFAULT_STATE = {
  role:'employee', name:'', company:'',
  jdText:'', detectedRole:'', detectedIndustry:'',
  trackFields:[], goal:'', checkins:[], feedPosts:[],
  bestStreak:0, daysActive:0
};

let S = {...DEFAULT_STATE};

// ── SUPABASE AUTH ────────────────────────────────────────────────────────────

async function sbSignUp(email, password){
  if(!db) throw new Error('Supabase not configured');
  const {data,error} = await db.auth.signUp({
    email, password,
    options:{ data:{ full_name: S.name } }
  });
  if(error) throw error;
  currentUser = data.user;
  return data.user;
}

async function sbSignIn(email, password){
  if(!db) throw new Error('Supabase not configured');
  const {data,error} = await db.auth.signInWithPassword({email,password});
  if(error) throw error;
  currentUser = data.user;
  return data.user;
}
