<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workable — Your Daily Performance Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   WORKABLE — Design System v3
   Brand: Deep Purple + Rich Gold + Clean Neutrals
   Style: LinkedIn-professional × modern SaaS
═══════════════════════════════════════════════════════════ */
:root {
  /* Brand */
  --purple:       #5C2D91;
  --purple2:      #7B3FB5;
  --purple3:      #9B59D0;
  --purple-light: #EDE4F8;
  --purple-pale:  #F6F0FD;
  --purple-dark:  #3D1A6E;

  --gold:         #C9A227;
  --gold2:        #E2B93B;
  --gold3:        #F0CC6A;
  --gold-light:   #FDF3D8;
  --gold-dark:    #A07D10;

  /* Neutrals */
  --ink:          #1B1040;
  --ink2:         #3D2E6B;
  --ink3:         #7B6FA0;
  --ink4:         #A99CC4;

  --surface:      #FAFAFE;
  --surface2:     #F2EEF9;
  --surface3:     #E8E2F5;
  --white:        #FFFFFF;

  /* Semantic */
  --green:        #10B981;
  --green-light:  #D1FAE5;
  --red:          #EF4444;
  --red-light:    #FEE2E2;
  --amber:        #F59E0B;
  --amber-light:  #FEF3C7;
  --blue:         #3B82F6;
  --blue-light:   #DBEAFE;
  --teal:         #0D9488;
  --teal-light:   #CCFBF1;

  /* Radii */
  --r:            10px;
  --r2:           16px;
  --r3:           24px;

  /* Shadows */
  --sh1: 0 1px 4px rgba(92,45,145,.08);
  --sh2: 0 4px 20px rgba(92,45,145,.12);
  --sh3: 0 8px 40px rgba(92,45,145,.18);
  --sh-gold: 0 4px 20px rgba(201,162,39,.25);

  /* Gradients */
  --grad-purple: linear-gradient(135deg, #5C2D91 0%, #7B3FB5 100%);
  --grad-gold:   linear-gradient(135deg, #C9A227 0%, #E2B93B 100%);
  --grad-hero:   linear-gradient(135deg, #3D1A6E 0%, #5C2D91 50%, #7B3FB5 100%);
  --grad-card:   linear-gradient(145deg, #ffffff 0%, #F6F0FD 100%);
}

/* ── RESET & BASE ──────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Instrument Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Syne',sans-serif;font-weight:700;line-height:1.2}
button{font-family:'Instrument Sans',sans-serif;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1)}
input,textarea,select{font-family:'Instrument Sans',sans-serif;font-size:14px}
a{text-decoration:none;color:var(--purple)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface2)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ink4)}

/* ── SCREENS ─────────────────────────────────────────── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ══════════════════════════════════════════════════════
   LANDING PAGE — Hero dark with gold accents
══════════════════════════════════════════════════════ */
#landing{
  background:var(--ink);
  overflow:hidden;position:relative;
  align-items:center;justify-content:center;
  padding:2rem;text-align:center
}
/* Layered background */
.lb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.22;pointer-events:none}
.lb1{width:600px;height:600px;background:var(--purple2);top:-150px;left:-120px}
.lb2{width:500px;height:500px;background:#1a0a3d;bottom:-100px;right:-80px}
.lb3{width:350px;height:350px;background:var(--gold-dark);bottom:80px;left:40%}
.lb4{width:200px;height:200px;background:var(--teal);top:30%;right:10%}
.lgrid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,162,39,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,162,39,.06) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none
}
/* Gold corner accents */
.lcorner{position:absolute;pointer-events:none}
.lcorner-tl{top:0;left:0;width:200px;height:200px;background:linear-gradient(135deg,rgba(201,162,39,.12) 0%,transparent 60%)}
.lcorner-br{bottom:0;right:0;width:200px;height:200px;background:linear-gradient(315deg,rgba(92,45,145,.2) 0%,transparent 60%)}

.li{position:relative;z-index:1;max-width:680px;animation:riseUp .9s ease both}

/* Nav bar */
.lnav{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.25rem 2.5rem;
}
.lnav-logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff}
.lnav-lm{width:34px;height:34px;border-radius:9px;background:var(--grad-gold);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--sh-gold)}
.lnav-actions{display:flex;gap:10px}
.lnav-login{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);padding:8px 20px;border-radius:var(--r);font-size:13px;font-weight:600;backdrop-filter:blur(8px)}
.lnav-login:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}

.lbadge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,162,39,.15);
  border:1px solid rgba(201,162,39,.35);
  border-radius:99px;padding:6px 16px;
  font-size:12px;font-weight:600;color:var(--gold3);
  margin-bottom:2rem;letter-spacing:.03em;
  backdrop-filter:blur(8px)
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--gold2);box-shadow:0 0 8px var(--gold2);animation:pulse 2s infinite}

.lh1{
  font-size:clamp(2.8rem,7vw,5rem);color:#fff;
  margin-bottom:1.25rem;letter-spacing:-.025em;
  text-shadow:0 2px 20px rgba(0,0,0,.3)
}
.lh1 .grad-text{
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold3) 50%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.lsub{
  font-size:17px;color:rgba(255,255,255,.65);
  margin-bottom:2.5rem;line-height:1.75;
  max-width:520px;margin-left:auto;margin-right:auto
}

.lbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:3.5rem}

/* Primary CTA — Gold */
.bth{
  background:var(--grad-gold);color:var(--ink);
  border:none;padding:16px 36px;border-radius:var(--r);
  font-size:15px;font-weight:700;
  box-shadow:var(--sh-gold);letter-spacing:.01em
}
.bth:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,162,39,.4)}

/* Secondary — ghost */
.btg{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);
  border:1.5px solid rgba(255,255,255,.2);
  padding:16px 36px;border-radius:var(--r);font-size:15px;font-weight:500;
  backdrop-filter:blur(8px)
}
.btg:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35)}

/* Feature pills */
.lfeatures{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:3rem}
.lfeat{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:99px;padding:7px 14px;
  font-size:12px;font-weight:500;color:rgba(255,255,255,.75)
}
.lfeat-ic{font-size:14px}

.lstats{display:flex;gap:0;justify-content:center;margin-top:1rem}
.lstat{text-align:center;padding:0 2.5rem;border-right:1px solid rgba(255,255,255,.1)}
.lstat:last-child{border-right:none}
.lsn{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:var(--grad-gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lsl{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}

/* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
#login{
  background:var(--surface);align-items:center;justify-content:center;
  padding:1.5rem;position:relative;overflow:hidden
}
#login::before{
  content:'';position:absolute;top:0;left:0;right:0;height:280px;
  background:var(--grad-hero);clip-path:ellipse(120% 100% at 50% 0%)
}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;margin-top:3rem}
.login-logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#fff;
  justify-content:center;margin-bottom:2rem
}
.login-lm{width:38px;height:38px;border-radius:11px;background:var(--grad-gold);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--sh-gold)}
.login-card{
  background:var(--white);border-radius:var(--r3);
  padding:2.25rem;box-shadow:var(--sh3);
  border:1px solid var(--surface3)
}
.login-card h2{font-size:1.5rem;color:var(--ink);margin-bottom:.3rem}
.login-card p{font-size:13px;color:var(--ink3);margin-bottom:1.5rem}
.back-link{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:rgba(255,255,255,.7);
  margin-bottom:1rem;cursor:pointer;
  background:none;border:none;padding:0
}
.back-link:hover{color:#fff}

/* ══════════════════════════════════════════════════════
   ONBOARDING
══════════════════════════════════════════════════════ */
#onboarding{
  background:var(--surface);align-items:center;justify-content:center;
  padding:1.5rem 1rem;position:relative;overflow:hidden;min-height:100vh
}
#onboarding::before{
  content:'';position:absolute;top:0;left:0;right:0;height:220px;
  background:var(--grad-hero);clip-path:ellipse(130% 100% at 50% 0%);z-index:0
}
.obw{width:100%;max-width:520px;position:relative;z-index:1}
.oblogo{
  display:flex;align-items:center;gap:10px;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff;
  margin-bottom:1.75rem;justify-content:center
}
.oblm{width:34px;height:34px;border-radius:9px;background:var(--grad-gold);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:var(--sh-gold)}

.obprog{display:flex;gap:5px;margin-bottom:1.75rem}
.ops{height:4px;border-radius:2px;flex:1;background:rgba(255,255,255,.2);transition:background .4s}
.ops.done{background:var(--gold2)}

.obc{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r3);
  padding:2rem 2rem 1.75rem;
  box-shadow:var(--sh3);
  display:none;
  animation:riseUp .35s ease both
}
.obc.active{display:block}
.obey{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--purple);
  margin-bottom:.4rem;
  display:flex;align-items:center;gap:6px
}
.obey::before{content:'';display:inline-block;width:18px;height:2px;background:var(--gold);border-radius:1px}
.obt{font-size:1.65rem;color:var(--ink);margin-bottom:.4rem}
.obs{font-size:14px;color:var(--ink3);margin-bottom:1.5rem;line-height:1.65}

/* Back button in onboarding */
.ob-back{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--ink3);
  background:none;border:none;padding:0;margin-bottom:1.25rem;
  cursor:pointer
}
.ob-back:hover{color:var(--purple)}

/* Form fields */
.fld{margin-bottom:1rem}
.fld label{
  display:block;font-size:12px;font-weight:700;
  color:var(--ink2);margin-bottom:.4rem;
  letter-spacing:.02em;text-transform:uppercase
}
.fld input,.fld textarea,.fld select{
  width:100%;background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.8rem 1rem;
  color:var(--ink);outline:none;
  transition:all .18s;font-size:14px
}
.fld input:focus,.fld textarea:focus,.fld select:focus{
  border-color:var(--purple);background:var(--white);
  box-shadow:0 0 0 3px rgba(92,45,145,.08)
}
.fld textarea{resize:vertical;min-height:85px}
.fld-hint{font-size:11px;color:var(--ink4);margin-top:.3rem}

/* Role cards */
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.rcard{
  background:var(--surface);
  border:2px solid var(--surface3);
  border-radius:var(--r2);
  padding:1.4rem 1.2rem;
  cursor:pointer;transition:all .2s;text-align:center;
  position:relative;overflow:hidden
}
.rcard::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--grad-gold);opacity:0;transition:opacity .2s
}
.rcard:hover{border-color:var(--purple3);background:var(--purple-pale);transform:translateY(-2px);box-shadow:var(--sh2)}
.rcard:hover::after{opacity:1}
.rcard.sel{border-color:var(--purple);background:var(--purple-light);box-shadow:0 0 0 3px rgba(92,45,145,.1)}
.rcard.sel::after{opacity:1}
.remoji{font-size:2.4rem;margin-bottom:.7rem;display:block}
.rname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:.3rem}
.rdesc{font-size:12px;color:var(--ink3);line-height:1.5}

/* Upload zone */
.uzn{
  border:2px dashed var(--surface3);
  border-radius:var(--r2);padding:1.75rem;
  text-align:center;cursor:pointer;
  transition:all .2s;margin-bottom:.75rem;
  position:relative;overflow:hidden;
  background:var(--surface)
}
.uzn:hover,.uzn.active{border-color:var(--purple);background:var(--purple-pale)}
.uzn.done{border-color:var(--green);background:var(--green-light)}
.uzn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uz-ic{font-size:2rem;margin-bottom:.6rem;display:block}
.uz-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:.25rem}
.uz-sub{font-size:12px;color:var(--ink3)}

/* AI reading pill */
.aip{
  display:none;align-items:flex-start;gap:10px;
  background:var(--purple-pale);
  border:1.5px solid var(--purple-light);
  border-radius:var(--r);padding:.85rem 1rem;
  margin:.75rem 0;font-size:13px;color:var(--purple2);line-height:1.6
}
.aip.show{display:flex}
.aip.donep{background:var(--green-light);border-color:var(--green);color:#065f46}
.aispin{
  width:16px;height:16px;flex-shrink:0;margin-top:2px;
  border:2px solid var(--purple-light);border-top-color:var(--purple);
  border-radius:50%;animation:spin .7s linear infinite
}
.aip.donep .aispin{display:none}

/* Track field items */
.tlist{display:flex;flex-direction:column;gap:5px;margin-bottom:.75rem}
.titem{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.65rem 1rem;
  transition:border-color .15s
}
.titem:hover{border-color:var(--purple3)}
.tihandle{color:var(--ink4);font-size:14px;cursor:grab}
.tilabel{flex:1;font-size:13px;font-weight:500;color:var(--ink)}
.titype{
  font-size:10px;font-weight:700;padding:3px 9px;
  border-radius:99px;background:var(--purple-light);color:var(--purple)
}
.tidel{
  font-size:15px;color:var(--ink4);
  border:none;background:none;padding:3px 5px;
  border-radius:6px;line-height:1
}
.tidel:hover{background:var(--red-light);color:var(--red)}
.addtf{
  width:100%;background:transparent;
  border:1.5px dashed var(--surface3);
  border-radius:var(--r);padding:.65rem;
  font-size:13px;font-weight:600;color:var(--ink3);
  display:flex;align-items:center;justify-content:center;gap:6px
}
.addtf:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-pale)}

/* Buttons */
.btp{
  background:var(--grad-purple);color:#fff;border:none;
  padding:14px 28px;border-radius:var(--r);
  font-size:15px;font-weight:600;width:100%;
  margin-top:1rem;box-shadow:0 4px 16px rgba(92,45,145,.3);
  letter-spacing:.01em
}
.btp:hover{background:linear-gradient(135deg,#6d36a8,#8b4cc8);transform:translateY(-1px);box-shadow:0 6px 24px rgba(92,45,145,.4)}
.btp:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btp-gold{
  background:var(--grad-gold);color:var(--ink);border:none;
  padding:14px 28px;border-radius:var(--r);
  font-size:15px;font-weight:700;width:100%;
  margin-top:1rem;box-shadow:var(--sh-gold)
}
.btp-gold:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,162,39,.45)}
.bts{
  background:var(--surface);color:var(--ink3);
  border:1.5px solid var(--surface3);
  padding:13px 28px;border-radius:var(--r);
  font-size:14px;font-weight:500;width:100%;margin-top:.5rem
}
.bts:hover{border-color:var(--purple3);color:var(--purple);background:var(--purple-pale)}

/* Success circle */
.sc{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-light),var(--gold-light));
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 1.25rem;
  animation:pop .4s ease both;
  box-shadow:var(--sh-gold)
}

/* ══════════════════════════════════════════════════════
   APP SHELL — Sidebar + Main
══════════════════════════════════════════════════════ */
#app{flex-direction:row;background:var(--surface)}

/* Sidebar */
.sidebar{
  width:252px;flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--surface3);
  display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;
  overflow-y:auto;overflow-x:hidden
}
/* Sidebar header with gradient */
.sblogo{
  display:flex;align-items:center;gap:10px;
  padding:1.25rem 1.25rem 1.1rem;
  background:var(--grad-hero);
  margin-bottom:.75rem
}
.sblm{
  width:34px;height:34px;border-radius:9px;
  background:var(--grad-gold);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
  box-shadow:var(--sh-gold)
}
.sblt{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff}
.sbver{font-size:10px;color:rgba(255,255,255,.4);margin-left:auto;font-weight:600;letter-spacing:.05em}

.sbsec{padding:0 .75rem;margin-bottom:.5rem}
.sbsl{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink4);
  padding:.6rem .5rem .25rem;display:flex;align-items:center;gap:6px
}
.sbi{
  display:flex;align-items:center;gap:10px;
  padding:.6rem .75rem;border-radius:var(--r);
  font-size:13px;font-weight:500;color:var(--ink3);
  cursor:pointer;transition:all .15s;margin-bottom:2px;
  border:none;background:none;width:100%;text-align:left;
  position:relative
}
.sbi:hover{background:var(--surface2);color:var(--ink)}
.sbi.active{
  background:linear-gradient(135deg,var(--purple-light),var(--gold-light));
  color:var(--purple);font-weight:600
}
.sbi.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:3px;background:var(--grad-gold);border-radius:0 2px 2px 0
}
.sbii{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:var(--surface2);transition:background .15s
}
.sbi.active .sbii{background:var(--purple);font-size:14px}
.sbbadge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:9px;font-weight:700;
  padding:2px 7px;border-radius:99px;
  animation:pulse 2s infinite
}
.sb-divider{height:1px;background:var(--surface3);margin:.5rem .75rem}

/* Sidebar user */
.sbuser{padding:1rem 1.25rem;border-top:1px solid var(--surface3);margin-top:auto}
.sbav{
  width:38px;height:38px;border-radius:50%;
  background:var(--grad-purple);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
  flex-shrink:0;border:2px solid var(--gold)
}
.sbuname{font-size:13px;font-weight:600;color:var(--ink)}
.sburole{font-size:11px;color:var(--ink4)}
.sb-signout{
  width:100%;background:transparent;
  border:1px solid var(--red-light);color:var(--red);
  border-radius:var(--r);padding:7px 12px;
  font-size:12px;font-weight:600;
  margin-top:.75rem;text-align:left;
  display:flex;align-items:center;gap:6px
}
.sb-signout:hover{background:var(--red-light)}

/* Mobile nav */
.mobnav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--white);
  border-top:1px solid var(--surface3);
  padding:.5rem 1rem calc(.5rem + env(safe-area-inset-bottom));
  z-index:50;justify-content:space-around;align-items:center;
  box-shadow:0 -4px 20px rgba(92,45,145,.08)
}
.mni{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:.4rem .6rem;border-radius:var(--r);
  border:none;background:none;font-size:10px;font-weight:600;
  color:var(--ink4);cursor:pointer;transition:all .15s;min-width:50px
}
.mni.active{color:var(--purple)}
.mni-ic{font-size:20px;line-height:1}

/* ── MAIN CONTENT ── */
.main{flex:1;overflow-y:auto;min-height:100vh;background:var(--surface)}
.page{display:none;padding:1.75rem 2rem;max-width:1080px}
.page.active{display:block;animation:riseUp .3s ease both}

/* Page header */
.phead{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem
}
.phead-left{display:flex;align-items:flex-start;gap:12px}
/* Back button */
.back-btn{
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:50%;
  background:var(--white);border:1.5px solid var(--surface3);
  font-size:16px;color:var(--ink3);flex-shrink:0;margin-top:4px;
  box-shadow:var(--sh1)
}
.back-btn:hover{background:var(--purple-light);border-color:var(--purple);color:var(--purple);transform:scale(1.05)}
.ptitle{font-size:1.85rem;color:var(--ink);margin-bottom:.2rem;letter-spacing:-.01em}
.psub{font-size:13px;color:var(--ink3)}

/* Action button (top right of pages) */
.btn-action{
  background:var(--grad-purple);color:#fff;border:none;
  padding:10px 20px;border-radius:var(--r);
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 2px 12px rgba(92,45,145,.25)
}
.btn-action:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(92,45,145,.35)}
.btn-gold{
  background:var(--grad-gold);color:var(--ink);border:none;
  padding:10px 20px;border-radius:var(--r);
  font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:7px;
  box-shadow:var(--sh-gold)
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,162,39,.4)}
.btn-outline{
  background:var(--white);color:var(--ink2);
  border:1.5px solid var(--surface3);
  padding:10px 20px;border-radius:var(--r);
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:7px;
  box-shadow:var(--sh1)
}
.btn-outline:hover{border-color:var(--purple3);color:var(--purple);background:var(--purple-pale)}

/* ── KPI GRID ─────────────────────────────────────── */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.75rem}
.kpi{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r2);
  padding:1.25rem 1.4rem;
  transition:all .2s;cursor:default;
  position:relative;overflow:hidden
}
.kpi::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  opacity:0;transition:opacity .2s;
  background:var(--grad-gold)
}
.kpi:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.kpi:hover::after{opacity:1}
.kpic{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-bottom:.9rem
}
.kpiv{
  font-family:'Syne',sans-serif;font-size:1.9rem;
  font-weight:800;color:var(--ink);line-height:1
}
.kpil{font-size:12px;color:var(--ink3);margin-top:.3rem;font-weight:500}
.kpid{font-size:11px;font-weight:700;margin-top:.25rem;letter-spacing:.01em}
.kpid.up{color:var(--green)}.kpid.dn{color:var(--red)}.kpid.fl{color:var(--ink4)}

/* ── CARDS ──────────────────────────────────────── */
.card{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r2);
  padding:1.4rem 1.5rem;
  margin-bottom:1rem;
  box-shadow:var(--sh1)
}
.card:hover{box-shadow:var(--sh2)}
.card-purple{
  background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 100%);
  border:none;color:#fff
}
.card-gold{
  background:linear-gradient(135deg,#7A5F0A 0%,var(--gold-dark) 50%,var(--gold) 100%);
  border:none;color:#fff
}
.chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:8px}
.ctitle{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  color:var(--ink);display:flex;align-items:center;gap:7px
}
.ctitle-gold{color:var(--gold-dark)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

/* ── PROGRESS BARS ──────────────────────────────── */
.br2{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.blbl{color:var(--ink2);font-weight:500}
.bvl{font-weight:700;color:var(--ink)}
.btrack{
  height:8px;background:var(--surface2);
  border-radius:4px;overflow:hidden;margin-bottom:.85rem;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.06)
}
.bfill{height:100%;border-radius:4px;transition:width .9s cubic-bezier(.4,0,.2,1)}

/* Sparkline */
.sparkline-wrap{display:flex;align-items:flex-end;gap:3px;height:36px;margin:.75rem 0}
.spark-bar{flex:1;min-width:4px;border-radius:3px 3px 0 0;transition:height .5s ease,background .3s}

/* ── BADGES ─────────────────────────────────────── */
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.02em}
.bg{background:var(--green-light);color:#065f46}
.ba{background:var(--amber-light);color:#92400e}
.br3{background:var(--red-light);color:#991b1b}
.bv{background:var(--purple-light);color:var(--purple-dark)}
.bb{background:var(--blue-light);color:#1e40af}
.bgold{background:var(--gold-light);color:var(--gold-dark)}

/* ── ROW LISTS ──────────────────────────────────── */
.rl2{display:flex;flex-direction:column}
.ri{
  display:flex;justify-content:space-between;align-items:center;
  padding:.75rem 0;border-bottom:1px solid var(--surface2);gap:8px
}
.ri:last-child{border-bottom:none}
.rlbl{font-size:13px;color:var(--ink2);flex:1;line-height:1.5;font-weight:500}
.rvl{font-size:13px;font-weight:700;color:var(--ink)}

/* ── STREAK BANNER ──────────────────────────────── */
.streak-banner{
  background:linear-gradient(135deg,var(--purple-dark),var(--purple2));
  border-radius:var(--r2);padding:1rem 1.25rem;
  display:none;align-items:center;gap:12px;
  margin-bottom:1rem;position:relative;overflow:hidden
}
.streak-banner::after{
  content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(201,162,39,.15)
}
.streak-fire{font-size:2rem;flex-shrink:0;animation:bounce 1s ease infinite}
.streak-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff}
.streak-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:2px}

/* ── CHECK-IN FIELDS ──────────────────────────── */
.cif{margin-bottom:1.25rem}
.cilbl{
  font-size:14px;font-weight:700;color:var(--ink);
  margin-bottom:.65rem;display:flex;align-items:center;gap:7px
}
.cilbl-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:var(--grad-gold);color:var(--ink);
  font-size:10px;font-weight:800;flex-shrink:0
}
.rrow{display:flex;gap:8px;flex-wrap:wrap}
.rbtn{
  flex:1;min-width:44px;padding:.75rem .5rem;
  border-radius:var(--r);
  border:2px solid var(--surface3);
  background:var(--surface);
  color:var(--ink2);font-size:15px;font-weight:700;
  text-align:center;transition:all .15s
}
.rbtn:hover{border-color:var(--purple3);background:var(--purple-pale)}
.rbtn.sel{
  border-color:var(--purple);
  background:var(--grad-purple);
  color:#fff;
  box-shadow:0 2px 10px rgba(92,45,145,.3)
}
.trow{display:flex;gap:8px}
.tbtn{
  flex:1;padding:.8rem;border-radius:var(--r);
  border:2px solid var(--surface3);
  background:var(--surface);
  font-size:14px;font-weight:600;text-align:center
}
.tbtn.yes{border-color:var(--green);background:var(--green-light);color:#065f46}
.tbtn.no{border-color:var(--red);background:var(--red-light);color:#991b1b}
.cita{
  width:100%;background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.85rem 1rem;
  font-size:14px;color:var(--ink);outline:none;
  resize:vertical;min-height:75px;transition:all .18s
}
.cita:focus,.cinum:focus{
  border-color:var(--purple);background:var(--white);
  box-shadow:0 0 0 3px rgba(92,45,145,.08)
}
.cinum{
  width:100%;background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.85rem 1rem;
  font-size:14px;color:var(--ink);outline:none;transition:all .18s
}
/* "Already done today" state */
.ci-done-today{
  background:linear-gradient(135deg,var(--purple-light),var(--gold-light));
  border:1.5px solid var(--purple-light);
  border-radius:var(--r2);padding:2rem;text-align:center;
  margin-bottom:1rem
}
.ci-done-ic{font-size:2.5rem;margin-bottom:.75rem;display:block}

/* ── AI CHAT ───────────────────────────────────── */
.chatbox{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r2);
  overflow:hidden;
  box-shadow:var(--sh2)
}
.chatmsgs{
  height:370px;overflow-y:auto;
  padding:1.25rem;
  display:flex;flex-direction:column;gap:12px;
  background:linear-gradient(180deg,var(--surface) 0%,var(--white) 100%)
}
.cm{display:flex;gap:9px;max-width:87%}
.cm.user{flex-direction:row-reverse;align-self:flex-end}
.cmav{
  width:32px;height:32px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700
}
.cm.ai .cmav{background:var(--grad-purple);color:#fff;box-shadow:0 2px 8px rgba(92,45,145,.25)}
.cm.user .cmav{background:var(--surface3);color:var(--ink3)}
.cmbub{padding:.8rem 1rem;border-radius:14px;font-size:13px;line-height:1.65}
.cm.ai .cmbub{
  background:var(--white);
  border:1.5px solid var(--surface3);
  color:var(--ink);
  border-radius:4px 14px 14px 14px;
  box-shadow:var(--sh1)
}
.cm.user .cmbub{
  background:var(--grad-purple);color:#fff;
  border-radius:14px 4px 14px 14px
}
.cirow{
  display:flex;gap:8px;padding:1rem 1.1rem;
  border-top:1px solid var(--surface3);
  background:var(--white)
}
.cinput{
  flex:1;background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.7rem 1rem;
  font-size:13px;color:var(--ink);outline:none;transition:all .18s
}
.cinput:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(92,45,145,.08)}
.csbtn{
  background:var(--grad-purple);color:#fff;border:none;
  border-radius:var(--r);padding:.7rem 1.25rem;
  font-size:13px;font-weight:700;
  box-shadow:0 2px 8px rgba(92,45,145,.25)
}
.csbtn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(92,45,145,.35)}
.schip{
  font-size:12px;padding:6px 14px;border-radius:99px;
  border:1.5px solid var(--surface3);
  background:var(--white);color:var(--ink3);cursor:pointer;
  font-weight:500;transition:all .15s
}
.schip:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-pale)}

/* ── COMMUNITY ─────────────────────────────────── */
.fcomp{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r2);
  padding:1.25rem;margin-bottom:1rem;
  box-shadow:var(--sh1)
}
.ctop{display:flex;gap:12px;margin-bottom:.85rem}
.cav2{
  width:44px;height:44px;border-radius:50%;
  background:var(--grad-purple);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;flex-shrink:0;
  border:2px solid var(--gold);
  box-shadow:var(--sh-gold)
}
.cta2{
  flex:1;background:var(--surface);
  border:1.5px solid var(--surface3);
  border-radius:var(--r);padding:.8rem 1rem;
  font-size:14px;color:var(--ink);outline:none;
  resize:none;min-height:72px;transition:all .18s
}
.cta2:focus{border-color:var(--purple);background:var(--white);box-shadow:0 0 0 3px rgba(92,45,145,.08)}
.cbot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.ctags{display:flex;gap:6px;flex-wrap:wrap}
.tchip{
  font-size:12px;padding:5px 12px;border-radius:99px;
  border:1.5px solid var(--surface3);
  background:var(--surface);color:var(--ink3);cursor:pointer;
  font-weight:600;transition:all .15s
}
.tchip:hover{border-color:var(--purple3);color:var(--purple)}
.tchip.sel{border-color:var(--gold);background:var(--gold-light);color:var(--gold-dark)}
.cpbtn{
  background:var(--grad-purple);color:#fff;border:none;
  border-radius:var(--r);padding:9px 22px;
  font-size:13px;font-weight:700;
  box-shadow:0 2px 12px rgba(92,45,145,.25)
}
.cpbtn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(92,45,145,.35)}

/* Post cards */
.pcard{
  background:var(--white);
  border:1px solid var(--surface3);
  border-radius:var(--r2);
  padding:1.25rem 1.4rem;
  margin-bottom:.9rem;
  transition:all .2s;
  box-shadow:var(--sh1)
}
.pcard:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.phead2{display:flex;align-items:center;gap:10px;margin-bottom:.9rem}
.pav{
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  flex-shrink:0;border:2px solid var(--gold)
}
.pname{font-size:14px;font-weight:700;color:var(--ink)}
.prole{font-size:12px;color:var(--ink3);font-weight:500}
.ptime{font-size:11px;color:var(--ink4);margin-left:auto}
.pbody{font-size:14px;color:var(--ink2);line-height:1.75;margin-bottom:.85rem}
.ptag{
  display:inline-block;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:99px;
  margin-right:4px;margin-bottom:5px
}
.pstat{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface2);
  border:1px solid var(--surface3);
  border-radius:8px;padding:.35rem .85rem;
  font-size:12px;font-weight:600;color:var(--ink2);
  margin-bottom:.75rem;margin-right:.4rem
}
.pacts{display:flex;gap:4px;flex-wrap:wrap}
.pabtn{
  display:flex;align-items:center;gap:5px;
  background:var(--surface2);border:none;
  font-size:12px;font-weight:600;color:var(--ink3);
  padding:6px 12px;border-radius:99px;transition:all .15s
}
.pabtn:hover{background:var(--purple-light);color:var(--purple)}
.pabtn.liked{background:var(--red-light);color:var(--red)}

/* ── EMPTY STATES ──────────────────────────────── */
.empty{
  text-align:center;padding:4rem 1.5rem;
  background:var(--white);border-radius:var(--r2);
  border:1px solid var(--surface3);
  box-shadow:var(--sh1)
}
.eicon{font-size:3.5rem;margin-bottom:1.1rem;display:block}
.etitle{font-family:'Syne',sans-serif;font-size:1.3rem;color:var(--ink);margin-bottom:.5rem}
.esub{font-size:14px;color:var(--ink3);margin-bottom:1.75rem;line-height:1.7;max-width:300px;margin-left:auto;margin-right:auto}

/* ── SETTINGS ──────────────────────────────────── */
.settings-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:.85rem 0;border-bottom:1px solid var(--surface2);gap:10px
}
.settings-item:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:600;color:var(--ink)}
.settings-sub{font-size:12px;color:var(--ink3);margin-top:2px}
/* Toggle switch */
.toggle-sw{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;cursor:pointer;inset:0;
  background:var(--surface3);border-radius:34px;transition:.3s
}
.toggle-slider::before{
  content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;
  background:white;border-radius:50%;transition:.3s;box-shadow:var(--sh1)
}
.toggle-sw input:checked+.toggle-slider{background:var(--purple)}
.toggle-sw input:checked+.toggle-slider::before{transform:translateX(18px)}

/* ── PROFILE PAGE ──────────────────────────────── */
.profile-hero{
  background:var(--grad-hero);
  border-radius:var(--r2);padding:2rem;
  margin-bottom:1rem;position:relative;overflow:hidden;
  box-shadow:var(--sh3)
}
.profile-hero::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:150px;height:150px;border-radius:50%;
  background:rgba(201,162,39,.15)
}
.profile-avatar{
  width:72px;height:72px;border-radius:50%;
  background:var(--grad-gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
  color:var(--ink);margin-bottom:1rem;
  border:3px solid rgba(255,255,255,.3);
  box-shadow:var(--sh-gold)
}
.profile-name{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.25rem}
.profile-role{font-size:13px;color:rgba(255,255,255,.7)}

/* ── TEAM TABLE ────────────────────────────────── */
.team-table{width:100%;border-collapse:separate;border-spacing:0 6px}
.team-table thead th{
  text-align:left;padding:.6rem .9rem;
  font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink3);
  border-bottom:2px solid var(--surface3)
}
.team-table tbody tr{
  background:var(--white);
  box-shadow:var(--sh1);
  transition:all .15s
}
.team-table tbody tr:hover{box-shadow:var(--sh2);transform:translateX(2px)}
.team-table td{
  padding:.85rem .9rem;font-size:13px;color:var(--ink2);
  border-top:1px solid var(--surface2);
  border-bottom:1px solid var(--surface2)
}
.team-table td:first-child{border-left:1px solid var(--surface2);border-radius:var(--r) 0 0 var(--r)}
.team-table td:last-child{border-right:1px solid var(--surface2);border-radius:0 var(--r) var(--r) 0}
.team-name{font-weight:700;color:var(--ink)}
.team-av{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;margin-right:8px;vertical-align:middle
}

/* ── TOAST ──────────────────────────────────────── */
.toast{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;
  padding:.75rem 1.25rem;border-radius:99px;
  font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:all .3s;z-index:1000;
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.25);
  max-width:90vw
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-ic{font-size:16px}

/* ── MODAL ─────────────────────────────────────── */
[...]
